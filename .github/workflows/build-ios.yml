name: Build iOS IPA

on:
  workflow_dispatch: # Manual trigger only

jobs:
  build-ios:
    runs-on: macos-15 # Has Xcode 16.x
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Remove dev-client for production build
        run: |
          # Remove expo-dev-client to avoid simulator runtime issues
          npm uninstall expo-dev-client

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Patch Podfile for Swift concurrency
        run: |
          # Inject Swift concurrency fix into EXISTING post_install block
          # Find the post_install line and add our code right after it
          sed -i '' '/post_install do |installer|/a\
            installer.pods_project.targets.each do |target|\
              target.build_configurations.each do |config|\
                config.build_settings["SWIFT_STRICT_CONCURRENCY"] = "minimal"\
                if config.build_settings["SWIFT_VERSION"] == "6.0"\
                  config.build_settings["SWIFT_VERSION"] = "5.10"\
                end\
              end\
            end
          ' ios/Podfile

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build unsigned IPA
        working-directory: ios
        run: |
          # Build the .app for device (arm64) without code signing
          xcodebuild \
            -workspace MusicPlayer.xcworkspace \
            -scheme MusicPlayer \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package IPA
        run: |
          # Find the .app bundle
          APP_PATH=$(find ios/build -name "MusicPlayer.app" -type d | head -1)
          echo "Found app at: $APP_PATH"

          # Create Payload directory structure for IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/

          # Create the IPA (it's just a zip)
          zip -r MusicPlayer.ipa Payload
          rm -rf Payload

          echo "✅ IPA created: MusicPlayer.ipa"
          ls -lh MusicPlayer.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-unsigned
          path: MusicPlayer.ipa
          retention-days: 30
