name: Build iOS IPA

on:
  workflow_dispatch: # Manual trigger only

jobs:
  build-ios:
    runs-on: macos-15 # Has Xcode 16.x
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install iOS platform
        run: |
          # macOS-15 runners may not have iOS platform pre-installed
          xcodebuild -downloadPlatform iOS || echo "Platform may already be installed"
          # Verify SDK is available
          xcodebuild -showsdks | grep iphoneos
        timeout-minutes: 20

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Remove dev-client for production build
        run: |
          # Remove expo-dev-client to avoid simulator runtime issues
          npm uninstall expo-dev-client

      - name: Patch expo-modules-core for Swift concurrency
        run: |
          EMC="node_modules/expo-modules-core"
          
          # 1. Downgrade from Swift 6 to Swift 5.10 (avoids all strict concurrency errors)
          sed -i '' "s|s.swift_version  = '6.0'|s.swift_version  = '5.10'|" "$EMC/ExpoModulesCore.podspec"
          
          # 2. Fix Swift 6-only syntax: @MainActor in conformance clause
          # SwiftUIHostingView.swift line 45: remove @MainActor from protocol conformance
          sed -i '' 's|, @MainActor AnyExpoSwiftUIHostingView|, AnyExpoSwiftUIHostingView|' \
            "$EMC/ios/Core/Views/SwiftUI/SwiftUIHostingView.swift"
          
          # ViewDefinition.swift line 121: remove @MainActor from extension conformance
          sed -i '' 's|extension UIView: @MainActor AnyArgument|extension UIView: AnyArgument|' \
            "$EMC/ios/Core/Views/ViewDefinition.swift"
          
          echo "✅ Patched expo-modules-core: Swift 6.0 → 5.10 + removed @MainActor conformances"

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build unsigned IPA
        working-directory: ios
        run: |
          # Build the .app for device (arm64) without code signing
          xcodebuild \
            -workspace MusicPlayer.xcworkspace \
            -scheme MusicPlayer \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package IPA
        run: |
          # Find the .app bundle
          APP_PATH=$(find ios/build -name "MusicPlayer.app" -type d | head -1)
          echo "Found app at: $APP_PATH"

          # Create Payload directory structure for IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/

          # Create the IPA (it's just a zip)
          zip -r MusicPlayer.ipa Payload
          rm -rf Payload

          echo "✅ IPA created: MusicPlayer.ipa"
          ls -lh MusicPlayer.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-unsigned
          path: MusicPlayer.ipa
          retention-days: 30
